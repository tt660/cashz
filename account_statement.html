<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>الاعدادات</title>
    <link rel="stylesheet" href="bootstrap.min.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="categories.css" />
    <link rel="stylesheet" href="add_cash.css" />
    <link rel="stylesheet" href="config.css" />
    <link rel="stylesheet" href="account_statement.css" />
    <link rel="stylesheet" href="theme.css" />
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css" />
  </head>

  <div class="app">
    <div class="content">
      <header class="header">
    <div class="container-inner">
      <div class="header-left">
        <h1 class="logo">إدارة الكاش</h1>
        <nav class="navbar-inline" aria-label="القوائم">
          <ul>
            <a href="home.html">الرئيسية</a>
            <a href="add_cash.html">محافظ الكاش</a>
            <a href="add_bank.html">محافظ البنوك</a>
            <a href="reports.html">التقارير</a>
            <a href="categories.html">تصنيفات المحافظ</a>
            <a href="account_statement.html"> اليومية</a>
            <a href="config.html">الإعدادات</a>
          </ul>
        </nav>
      </div>

      <div class="header-right">
        <div class="user-quick">
          <div class="welcome">
            <span class="muted">مرحبًا،</span>
            <strong id="userName">مشمش</strong>
          </div>
          <div class="avatar" title="مشاهد التفاصيل">م</div>
        </div>

        <div class="icons">
          <button
            class="icon-btn"
            aria-label="إشعارات البيع"
            onclick="openBox('trade')"
          >
            <!-- coin SVG -->
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <circle
                cx="12"
                cy="12"
                r="9"
                stroke="currentColor"
                stroke-width="1.5"
              />
              <path
                d="M12 8v8M9 11h6"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            <span id="tradeCount" class="badge">0</span>
          </button>

          <button
            class="icon-btn"
            aria-label="حدود المحفظة"
            onclick="openBox('limit')"
          >
            <!-- chart SVG -->
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M4 18h16M8 14v4M12 10v8M16 6v12"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            <span id="limitCount" class="badge">0</span>
          </button>

          <button
            class="icon-btn"
            aria-label="آخر مكالمة"
            onclick="openBox('call')"
          >
            <!-- phone SVG -->
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M22 16.92V20a2 2 0 0 1-2.18 2A19 19 0 0 1 3 5.18 2 2 0 0 1 5 3h3.09a1 1 0 0 1 1 .75c.12.56.36 1.77.6 2.37a1 1 0 0 1-.24 1L8.7 9.7a14 14 0 0 0 6.6 6.6l1.57-1.76a1 1 0 0 1 1-.24c.6.24 1.81.48 2.37.6a1 1 0 0 1 .75 1V16.92z"
                stroke="currentColor"
                stroke-width="1.2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            <span id="callCount" class="badge">0</span>
          </button>

          

          <a
            href="logout.html"
            class="icon-btn logout"
            title="تسجيل الخروج"
            aria-label="تسجيل الخروج"
          >
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"
                stroke="currentColor"
                stroke-width="1.2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M16 17l5-5-5-5"
                stroke="currentColor"
                stroke-width="1.2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M21 12H9"
                stroke="currentColor"
                stroke-width="1.2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </a>
        </div>
      </div>
    </div>
    <div id="notificationBox" class="notification-box hidden">
      <div class="box-header">
        <h3 id="boxTitle">الإشعارات</h3>
        <button onclick="markAllRead()">قراءة الكل</button>
      </div>
      <ul id="notificationList"></ul>
    </div>
  </header>

  <body>
    <main class="container my-4">
      <div class="row g-3">
        <div class="col-12 col-lg-4">
          <div class="card p-3">
            <h4>شاشات عرض بيانات</h4>
            <div class="d-grid gap-2 mt-2">
              <button id="viewDrawerBtn" class="btn btn-outline-primary">
                الدرج
              </button>
              <button id="viewExpensesBtn" class="btn btn-outline-secondary">
                المصروف
              </button>
              <button id="viewSalesBtn" class="btn btn-outline-success">
                المبيعات
              </button>
              <button id="viewProfitBtn" class="btn btn-outline-warning">
                الأرباح
              </button>
              <button id="viewDeliveryBtn" class="btn btn-outline-info">
                التسليم
              </button>
            </div>
          </div>

          <div class="card p-3 mt-3">
            <h4>فتح فاتورة / تسجيل</h4>
            <form id="asForm">
              <div class="mb-2">
                <label class="form-label">التصنيف الرئيسي (يومي)</label>
                <select id="asMainSelect" class="form-select">
                  <option value="">اختر...</option>
                </select>
              </div>
              <div class="mb-2">
                <label class="form-label">التصنيف الفرعي</label>
                <select id="asSubSelect" class="form-select">
                  <option value="">اختر...</option>
                </select>
              </div>

              <div id="dynamicFields"></div>

              <div class="mb-2">
                <label class="form-label">ملاحظات (اختياري)</label>
                <textarea id="asNotes" class="form-control" rows="2"></textarea>
              </div>
              <div class="d-flex gap-2">
                <button
                  id="createInvoiceBtn"
                  class="btn btn-primary"
                  type="button"
                >
                  عمل فاتورة
                </button>
                <button
                  id="createManualInvoiceBtn"
                  class="btn btn-outline-dark"
                  type="button"
                >
                  فاتورة يدوية
                </button>
              </div>
            </form>
          </div>
        </div>

        <div class="col-12 col-lg-8">
          <div class="card p-3 mb-3 data-panel indigo">
            <h4>عرض / لوحة</h4>
            <div class="row g-2">
              <div class="col-12">
                <div class="card p-2 mb-2">
                  <canvas id="summaryChart" height="140"></canvas>
                </div>
              </div>
            </div>
            <div id="dashboardArea" class="row g-2">
              <!-- cards will be injected here -->
            </div>
          </div>

          <div class="card p-3 data-panel rose">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <h4 class="mb-0">قائمة الفواتير</h4>
              <div>
                <button
                  id="exportInvoices"
                  class="btn btn-sm btn-outline-secondary"
                >
                  تصدير CSV
                </button>
                <button
                  id="clearInvoices"
                  class="btn btn-sm btn-outline-danger"
                >
                  مسح الكل
                </button>
              </div>
            </div>
            <div id="invoicesList"></div>
          </div>
        </div>
      </div>
    </main>

    </div>
    </div>

    
    <script src="ui-alerts.js" defer></script>
    <script src="bootstrap.bundle.min.js"></script>
    <script src="categories.js"></script>
    <script src="add_cash.js"></script>
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="account_statement.js"></script>
    <button class="fab" id="fabAdd">+</button>
    <script src="chart-init.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
    <script src="alert.js"></script>
  </body>
</html>
