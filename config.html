<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>الاعدادات</title>
    <link rel="stylesheet" href="bootstrap.min.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="categories.css" />
    <link rel="stylesheet" href="add_cash.css" />
    <link rel="stylesheet" href="config.css" />
    <link rel="stylesheet" href="theme.css" />
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css" />
  </head>

  <div class="app">
    <div class="content">
      <header class="header">
    <div class="container-inner">
      <div class="header-left">
        <h1 class="logo">إدارة الكاش</h1>
        <nav class="navbar-inline" aria-label="القوائم">
          <ul>
            <a href="home.html">الرئيسية</a>
            <a href="add_cash.html">محافظ الكاش</a>
            <a href="add_bank.html">محافظ البنوك</a>
            <a href="reports.html">التقارير</a>
            <a href="categories.html">تصنيفات المحافظ</a>
            <a href="account_statement.html">تصنيف كشف الحساب</a>
            <a href="config.html">الإعدادات</a>
          </ul>
        </nav>
      </div>

      <div class="header-right">
        <div class="user-quick">
          <div class="welcome">
            <span class="muted">مرحبًا،</span>
            <strong id="userName">مشمش</strong>
          </div>
          <div class="avatar" title="مشاهد التفاصيل">م</div>
        </div>

        <div class="icons">
          <button
            class="icon-btn"
            aria-label="إشعارات البيع"
            onclick="openBox('trade')"
          >
            <!-- coin SVG -->
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <circle
                cx="12"
                cy="12"
                r="9"
                stroke="currentColor"
                stroke-width="1.5"
              />
              <path
                d="M12 8v8M9 11h6"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            <span id="tradeCount" class="badge">0</span>
          </button>

          <button
            class="icon-btn"
            aria-label="حدود المحفظة"
            onclick="openBox('limit')"
          >
            <!-- chart SVG -->
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M4 18h16M8 14v4M12 10v8M16 6v12"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            <span id="limitCount" class="badge">0</span>
          </button>

          <button
            class="icon-btn"
            aria-label="آخر مكالمة"
            onclick="openBox('call')"
          >
            <!-- phone SVG -->
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M22 16.92V20a2 2 0 0 1-2.18 2A19 19 0 0 1 3 5.18 2 2 0 0 1 5 3h3.09a1 1 0 0 1 1 .75c.12.56.36 1.77.6 2.37a1 1 0 0 1-.24 1L8.7 9.7a14 14 0 0 0 6.6 6.6l1.57-1.76a1 1 0 0 1 1-.24c.6.24 1.81.48 2.37.6a1 1 0 0 1 .75 1V16.92z"
                stroke="currentColor"
                stroke-width="1.2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            <span id="callCount" class="badge">0</span>
          </button>

          

          <a
            href="logout.html"
            class="icon-btn logout"
            title="تسجيل الخروج"
            aria-label="تسجيل الخروج"
          >
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"
                stroke="currentColor"
                stroke-width="1.2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M16 17l5-5-5-5"
                stroke="currentColor"
                stroke-width="1.2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M21 12H9"
                stroke="currentColor"
                stroke-width="1.2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </a>
        </div>
      </div>
    </div>
    <div id="notificationBox" class="notification-box hidden">
      <div class="box-header">
        <h3 id="boxTitle">الإشعارات</h3>
        <button onclick="markAllRead()">قراءة الكل</button>
      </div>
      <ul id="notificationList"></ul>
    </div>
  </header>

  <body>
    <section class="settings">
      <div class="container">
        <h2>بيانات الفاتورة</h2>
        <div class="settings-grid">
          <div class="col">
            <label>شعار المحل</label>
            <input id="logoInput" type="file" accept="image/*" />
            <div id="logoPreviewWrap" style="margin-top: 8px">
              <img
                id="logoPreview"
                src=""
                alt="logo"
                style="
                  max-width: 180px;
                  display: none;
                  border: 1px solid #eee;
                  padding: 6px;
                  border-radius: 6px;
                  background: #fff;
                "
              />
            </div>
            <div style="margin-top: 8px">
              <button id="clearLogo" type="button" class="btn">
                مسح الشعار
              </button>
            </div>
          </div>

          <div class="col">
            <div class="row">
              <label>اسم المحل</label>
              <input id="shopName" placeholder="اسم المحل" />
            </div>

            <div class="row">
              <label>رسالة منتصف الفاتورة (سطر/سطور)</label>
              <textarea
                id="midMessage"
                rows="4"
                placeholder="رسالة تظهر في وسط الفاتورة"
              ></textarea>
            </div>

            <div class="row">
              <label>رسالة أسفل الفاتورة</label>
              <textarea
                id="footerMessage"
                rows="3"
                placeholder="رسالة تظهر في أسفل الفاتورة"
              ></textarea>
            </div>
          </div>
        </div>

        <div style="margin-top: 12px">
          <button id="saveSettings" class="btn btn-primary">
            حفظ الإعدادات
          </button>
          <button id="resetSettings" class="btn">إعادة ضبط</button>
        </div>

        <div class="card mt-3 p-3">
          <h4>نظرة عامة سريعة</h4>
          <!-- <canvas id="configSummaryChart" height="120"></canvas> -->
        </div>

        <hr style="margin: 16px 0" />
        <h3>قيم ثابتة</h3>
        <div class="fixed-values">
          <div style="margin-bottom: 8px">
            <button id="addFixedBtn" class="btn">إضافة قيمة ثابتة جديدة</button>
          </div>
          <div id="fixedList" class="fixed-list"></div>
        </div>
      </div>
    </section>

    </div>
    </div>

    
    <script src="ui-alerts.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="bootstrap.bundle.min.js"></script>
    <script src="categories.js"></script>
    <script src="add_cash.js"></script>
    <script src="config.js"></script>
    <script src="chart-init.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
    <script src="alert.js"></script>
  </body>
</html>
