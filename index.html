<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>محافظ الكاش</title>
    <script>
      try {
        if (typeof window.renderWalletSelect === 'undefined') {
          window.renderWalletSelect = function () {
            console.warn('renderWalletSelect placeholder called before initialization; ignored.');
          };
        }
        try {
          if (typeof renderWalletSelect === 'undefined') {
            var renderWalletSelect = window.renderWalletSelect;
          }
        } catch (e) {}
      } catch (e) {}
    </script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="bootstrap.min.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="add_cash.css" />
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css" />
  </head>
  <body class="add-cash-page">
    <div class="app">
      <div class="content">
        <header class="header">
          <div class="container between">

            <div class="header-right">
        <div class="user-quick">
          <div class="welcome">
            <span class="muted">مرحبًا،</span>
            <strong id="userName">مشمش</strong>
          </div>
          <div class="avatar" title="مشاهد التفاصيل">م</div>
        </div>

        <div class="icons">
          <button
            class="icon-btn"
            aria-label="إشعارات البيع"
            onclick="openBox('trade')"
          >
            <!-- coin SVG -->
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <circle
                cx="12"
                cy="12"
                r="9"
                stroke="currentColor"
                stroke-width="1.5"
              />
              <path
                d="M12 8v8M9 11h6"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            <span id="tradeCount" class="badge">0</span>
          </button>

          <button
            class="icon-btn"
            aria-label="حدود المحفظة"
            onclick="openBox('limit')"
          >
            <!-- chart SVG -->
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M4 18h16M8 14v4M12 10v8M16 6v12"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            <span id="limitCount" class="badge">0</span>
          </button>

          <button
            class="icon-btn"
            aria-label="آخر مكالمة"
            onclick="openBox('call')"
          >
            <!-- phone SVG -->
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M22 16.92V20a2 2 0 0 1-2.18 2A19 19 0 0 1 3 5.18 2 2 0 0 1 5 3h3.09a1 1 0 0 1 1 .75c.12.56.36 1.77.6 2.37a1 1 0 0 1-.24 1L8.7 9.7a14 14 0 0 0 6.6 6.6l1.57-1.76a1 1 0 0 1 1-.24c.6.24 1.81.48 2.37.6a1 1 0 0 1 .75 1V16.92z"
                stroke="currentColor"
                stroke-width="1.2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            <span id="callCount" class="badge">0</span>
          </button>

          

          <a
            href="logout.html"
            class="icon-btn logout"
            title="تسجيل الخروج"
            aria-label="تسجيل الخروج"
          >
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"
                stroke="currentColor"
                stroke-width="1.2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M16 17l5-5-5-5"
                stroke="currentColor"
                stroke-width="1.2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M21 12H9"
                stroke="currentColor"
                stroke-width="1.2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </a>
        </div>
      </div>
    </div>
    <div id="notificationBox" class="notification-box hidden">
      <div class="box-header">
        <h3 id="boxTitle">الإشعارات</h3>
        <button onclick="markAllRead()">قراءة الكل</button>
      </div>
      <ul id="notificationList"></ul>
    </div>

            <div class="brand">إدارة الكاش</div>
            <nav aria-label="القوائم">
            <a href="home.html">الرئيسية</a>
            <a href="add_cash.html">محافظ الكاش</a>
            <a href="reports.html">التقارير</a>
            <a href="categories.html">تصنيفات المحافظ</a>
            <a href="account_statement.html">تصنيف كشف الحساب</a>
            <a href="config.html">الإعدادات</a>
            </nav>
          </div>

          
        </header>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
    <script src="alert.js"></script>

  </body>
</html>
